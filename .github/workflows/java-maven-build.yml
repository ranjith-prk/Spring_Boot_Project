name: Java CI

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Build Project
      run: mvn clean compile

    - name: Run Tests
      run: mvn test

    - name: Package Application
      run: mvn package

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: application
        path: target/*.jar
